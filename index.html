<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人名片</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <section class="profile">
        <div class="avatar">XX</div>
        <div class="intro">
          <p class="eyebrow">Hello, I'm</p>
          <h1>叶泽楷/h1>
          <p class="summary">
            我热爱用清晰、简洁的方式表达想法，专注于设计、内容和用户体验。
          </p>
        </div>
      </section>

      <section class="details">
        <div class="item">
          <span class="label">城市</span>
          <span class="value">温州 / 在线</span>
        </div>
        <div class="item">
          <span class="label">邮箱</span>
          <span class="value">yourname@example.com</span>
        </div>
        <div class="item">
          <span class="label">电话</span>
          <span class="value">+86 138 0000 0000</span>
        </div>
        <div class="item">
          <span class="label">网站</span>
          <span class="value">www.yourwebsite.com</span>
        </div>
      </section>

      <section class="actions">
        <a href="mailto:yourname@example.com">联系我</a>
        <a href="#" class="secondary">查看更多</a>
      </section>
    </main>
  </body>
</html>
